<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>谷秉鸿帅不帅</title>
<style>
  /* ===== 第一页：深色背景 + 按钮 ===== */
  #question {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #222;
    color: white;
    font-family: sans-serif;
    margin: 0;
  }
  #question h1 {
    font-size: 5vw;
    margin-bottom: 40px;
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
  }
  #question .btn-group {
    display: flex;
    gap: 30px;
  }
  #question button {
    font-size: 2.5vw;
    padding: 15px 50px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.3s, box-shadow 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  #question button:hover {
    transform: scale(1.1);
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
  }
  .btn-very {
    background: #ff6b6b;
    color: white;
  }
  .btn-normal {
    background: #4ecdc4;
    color: white;
  }

  /* ===== 第二页：浅色背景 + 彩虹文字 + 表情 ===== */
  #rainbow {
    display: none;           /* 初始隐藏 */
    margin: 0;
    height: 100vh;
    justify-content: center;
    align-items: center;
    background: #f5f5f5;    /* 浅色背景（网页自带风格） */
    overflow: hidden;
    flex-direction: column;  /* 让内容和表情垂直排列 */
  }
  #rainbow h1 {
    font-size: 10vw;
    font-weight: bold;
    animation: rainbow 1s infinite;
    text-align: center;
    padding: 0 20px;
    margin-bottom: 20px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.1); /* 轻微阴影增加可读性 */
  }
  /* 表情包区域 */
  #emojis {
    font-size: 6vw;
    letter-spacing: 1.5vw;
    animation: float 2s ease-in-out infinite;
  }
  @keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0); }
  }
  @keyframes rainbow {
    0%   { color: red; }
    20%  { color: yellow; }
    40%  { color: lime; }
    60%  { color: cyan; }
    80%  { color: pink; }
    100% { color: red; }
  }
</style>
</head>
<body>

<!-- 第一页：问题和按钮 -->
<div id="question">
  <h1>🤔 你觉得谷秉鸿帅吗？</h1>
  <div class="btn-group">
    <button class="btn-very" onclick="choose('很帅')">🔥 很帅</button>
    <button class="btn-normal" onclick="choose('帅')">✨ 帅</button>
  </div>
</div>

<!-- 第二页：彩虹 + 表情 -->
<div id="rainbow">
  <h1 id="text">谷秉鸿很帅！！！</h1>
  <div id="emojis">😂🤣😎🎉✨</div>
</div>

<script>
  function choose(option) {
    // 隐藏第一页
    document.getElementById('question').style.display = 'none';
    // 显示第二页
    var rainbow = document.getElementById('rainbow');
    rainbow.style.display = 'flex';

    var text = document.getElementById('text');
    var emojis = document.getElementById('emojis');

    if (option === '很帅') {
      text.innerHTML = '你很有眼光！👏';
      emojis.textContent = '😎🔥🤩💯👀';
    } else if (option === '帅') {
      text.innerHTML = '谢谢你，你也很帅！😄';
      emojis.textContent = '😊🙏✨🌟👏';
    }

    // 保留点击页面弹出提示
    document.body.onclick = function() {
      alert("没错，谷秉鸿真的很帅！");
    };
  }
</script>

</body>
</html>
