<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>谷秉鸿很帅</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    overflow:hidden;
}

h1{
    color:red;
    font-size:8vw;
    font-weight:bold;
    animation:flash 1s infinite;
}

@keyframes flash{

0%{
transform:scale(1);
opacity:1;
}

50%{
transform:scale(1.2);
opacity:0.5;
}

100%{
transform:scale(1);
opacity:1;
}

}

</style>
</head>

<body>

<h1>
谷秉鸿很帅！！！
</h1>

</body>
</html>
