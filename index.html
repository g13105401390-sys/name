<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>我的可点击网页</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 32px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #message {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>欢迎来到我的页面！</h1>
        <!-- 这是一个可点击的按钮 -->
        <button onclick="showMessage()">点我一下</button>
        <p id="message"></p>
    </div>

    <script>
        // 这是按钮点击后执行的 JavaScript 函数
        function showMessage() {
            document.getElementById("message").innerHTML = "🎉 你点击了按钮！";
        }
    </script>
</body>
</html>
