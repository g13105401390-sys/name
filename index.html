<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>谷秉鸿很帅</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
overflow:hidden;
}

h1{
font-size:10vw;
font-weight:bold;
animation:rainbow 1s infinite;
}

@keyframes rainbow{
0%{color:red;}
20%{color:yellow;}
40%{color:lime;}
60%{color:cyan;}
80%{color:pink;}
100%{color:red;}
}

</style>
</head>

<body>

<h1 id="text">
谷秉鸿很帅！！！
</h1>

<script>

document.body.onclick=function(){

alert("没错，谷秉鸿真的很帅！");

}

</script>

</body>
</html>
